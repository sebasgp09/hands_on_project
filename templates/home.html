<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Predicción de Seguros ML</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #333; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        .result { margin-top: 20px; padding: 10px; background-color: #e9ecef; border-radius: 4px; text-align: center; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Calculadora de Seguros</h2>
        <form action="/predict" method="POST">
            <input type="number" name="age" placeholder="Edad (ej. 25)" required>
            <select name="sex">
                <option value="male">Masculino</option>
                <option value="female">Femenino</option>
            </select>
            <input type="number" step="0.1" name="bmi" placeholder="IMC (ej. 28.5)" required>
            <input type="number" name="children" placeholder="Número de hijos" required>
            <select name="smoker">
                <option value="yes">Fumador</option>
                <option value="no">No fumador</option>
            </select>
            <select name="region">
                <option value="southwest">Suroeste</option>
                <option value="southeast">Sureste</option>
                <option value="northwest">Noroeste</option>
                <option value="northeast">Noreste</option>
            </select>
            <button type="submit">Calcular Predicción</button>
        </form>

        {% if prediction_text %}
            <div class="result">
                {{ prediction_text }}
            </div>
        {% endif %}
    </div>
</body>
</html>
